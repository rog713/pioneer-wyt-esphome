# Pioneer Mini Split - Production Configuration
# 
# This config includes essential sensors for daily use.
# Copy this file and customize for your device.
#
# For debugging/protocol investigation, see example-debug.yaml

substitutions:
  node_name: my-minisplit
  device_verbose_name: "My Mini Split"

esphome:
  name: ${node_name}
  friendly_name: ${device_verbose_name}

esp8266:
  board: esp_wroom_02
  restore_from_flash: true

# WiFi - create secrets.yaml with your credentials
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "${node_name}-hotspot"
    password: !secret ap_password

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  platform: esphome
  password: !secret ota_password

logger:
  level: INFO
  baud_rate: 0

web_server:
  port: 80

external_components:
  - source:
      type: local
      path: components

# UART to HVAC - 9600 baud, Even parity (8E1)
uart:
  tx_pin: GPIO15
  rx_pin: GPIO13
  baud_rate: 9600
  parity: EVEN

# Pioneer Mini Split Controller
pioneer_minisplit:
  name: "${device_verbose_name}"
  
  # ============================================
  # TEMPERATURE SENSORS (HA converts to your preferred unit)
  # ============================================
  current_temperature:
    name: "Indoor Temperature"
  outdoor_temp:
    name: "Outdoor Temperature"
  
  # ============================================
  # OPERATING SENSORS
  # ============================================
  compressor_freq:
    name: "Compressor Frequency"
  current_amps:
    name: "Current Draw"
  
  # ============================================
  # CONTROL SWITCHES
  # ============================================
  display_switch:
    name: "Display"
  beep_switch:
    name: "Beep"
  health_switch:
    name: "Health Ion"
  heater_8c_switch:
    name: "Frost Prevention"
  
  # ============================================
  # SWING POSITION CONTROLS
  # ============================================
  swing_v_select:
    name: "Vertical Position"
  swing_h_select:
    name: "Horizontal Position"

# ============================================
# OPTIONAL: Status LED
# ============================================
output:
  - platform: gpio
    id: status_led
    pin:
      number: GPIO5
      mode: output

interval:
  - interval: 1000ms
    then:
      - output.turn_on: status_led
      - delay: 100ms
      - output.turn_off: status_led

# ============================================
# UTILITIES
# ============================================
button:
  - platform: restart
    name: "Restart"
