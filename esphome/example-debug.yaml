# Pioneer Mini Split - Debug Configuration
# 
# This config includes ALL sensors for debugging and protocol investigation.
# Use example-production.yaml for daily use (fewer entities, less overhead).
#
# WARNING: This creates 50+ entities in Home Assistant!

substitutions:
  node_name: my-minisplit-debug
  device_verbose_name: "My Mini Split (Debug)"

esphome:
  name: ${node_name}
  friendly_name: ${device_verbose_name}

esp8266:
  board: esp_wroom_02
  restore_from_flash: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "${node_name}-hotspot"
    password: !secret ap_password

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  platform: esphome
  password: !secret ota_password

logger:
  level: DEBUG
  baud_rate: 0

web_server:
  port: 80

external_components:
  - source:
      type: local
      path: components

uart:
  tx_pin: GPIO15
  rx_pin: GPIO13
  baud_rate: 9600
  parity: EVEN

pioneer_minisplit:
  name: "${device_verbose_name}"
  
  # ============================================
  # TEMPERATURE SENSORS (HA converts to your preferred unit)
  # ============================================
  set_temperature:
    name: "Set Temp"
  current_temperature:
    name: "Current Temp"
  
  # Coil temperatures
  condenser_coil_temp:
    name: "Condenser Coil Temp"
  discharge_temp:
    name: "Compressor Discharge Temp"
  
  # Outdoor
  outdoor_temp:
    name: "Outdoor Temp"
  
  # ============================================
  # OPERATING SENSORS
  # ============================================
  compressor_freq:
    name: "Compressor Frequency"
  indoor_fan_rpm:
    name: "Indoor Fan RPM"
  outdoor_fan_speed:
    name: "Outdoor Fan Speed"
  current_amps:
    name: "Current Draw"
  
  # ============================================
  # STATUS TEXT SENSORS
  # ============================================
  power:
    name: "Power"
  mode:
    name: "Mode"
  fan:
    name: "Fan Speed"
  turbo:
    name: "Turbo Strong"
  mute:
    name: "Mute Quiet"
  swing:
    name: "Swing (Combined)"
  swing_v:
    name: "Swing Vertical"
  swing_h:
    name: "Swing Horizontal"
  eco:
    name: "Eco Mode"
  display:
    name: "Display"
  health:
    name: "Health Ion"
  heater_8c:
    name: "Frost Prevention"
  timer:
    name: "Timer Active"
  timer_time:
    name: "Timer Remaining"
  sleep:
    name: "Sleep Mode"
  beep:
    name: "Beep Buzzer"
  heat_mode_active:
    name: "Heat Mode Active"
  outdoor_running:
    name: "Outdoor Unit Status"
  
  # ============================================
  # PACKET LOGGING
  # ============================================
  last_tx:
    name: "Last TX Packet"
  last_rx:
    name: "Last RX Packet"
  packets_tx:
    name: "TX Count"
  packets_rx:
    name: "RX Count"
  
  # ============================================
  # RAW BYTE SENSORS (for protocol investigation)
  # ============================================
  byte9_raw:
    name: "Byte 9 Raw"
  byte10_raw:
    name: "Byte 10 Raw"
  byte18_raw:
    name: "Byte 18 Raw"
  byte19_raw:
    name: "Byte 19 Raw"
  byte30_raw:
    name: "Byte 30 Raw"
  byte32_raw:
    name: "Byte 32 Raw"
  byte33_raw:
    name: "Byte 33 Raw"
  byte34_raw:
    name: "Byte 34 Raw"
  byte35_raw:
    name: "Byte 35 Raw"
  byte36_raw:
    name: "Byte 36 Raw"
  byte37_raw:
    name: "Byte 37 Raw"
  byte50_raw:
    name: "Byte 50 Raw"
  byte51_raw:
    name: "Byte 51 Raw"
  
  # ============================================
  # BYTE HISTORY (track changes over time)
  # ============================================
  byte30_history:
    name: "Byte 30 History"
  byte34_history:
    name: "Byte 34 History"
  byte35_history:
    name: "Byte 35 History"
  byte36_history:
    name: "Byte 36 History"
  byte37_history:
    name: "Byte 37 History"
  
  # ============================================
  # DEBUG SENSORS (experimental decoding)
  # ============================================
  debug_byte30_state:
    name: "Dbg Byte 30 State"
  debug_byte34_state:
    name: "Dbg Byte 34 State"
  debug_byte35_state:
    name: "Dbg Byte 35 State"
  debug_byte36_state:
    name: "Dbg Byte 36 State"
  debug_byte37_state:
    name: "Dbg Byte 37 State"
  debug_pair_34_35_state:
    name: "Dbg Pair 34-35 State"
  debug_pair_35_36_state:
    name: "Dbg Pair 35-36 State"
  debug_pair_36_37_state:
    name: "Dbg Pair 36-37 State"
  debug_byte30_f_div4:
    name: "Dbg Byte 30 F (div4)"
  debug_byte34_f_div4:
    name: "Dbg Byte 34 F (div4)"
  debug_byte35_f_div4:
    name: "Dbg Byte 35 F (div4)"
  debug_byte36_f_div4:
    name: "Dbg Byte 36 F (div4)"
  debug_byte37_f_div4:
    name: "Dbg Byte 37 F (div4)"
  debug_pair_34_35_f_374:
    name: "Dbg Pair 34-35 F (374)"
  debug_pair_35_36_f_374:
    name: "Dbg Pair 35-36 F (374)"
  debug_pair_36_37_f_374:
    name: "Dbg Pair 36-37 F (374)"
  
  # ============================================
  # CONTROL SWITCHES
  # ============================================
  display_switch:
    name: "Display"
  beep_switch:
    name: "Beep Buzzer"
  health_switch:
    name: "Health Ion"
  heater_8c_switch:
    name: "Frost Prevention"
  
  # ============================================
  # SWING POSITION CONTROLS
  # ============================================
  swing_v_select:
    name: "Vertical Position"
  swing_h_select:
    name: "Horizontal Position"

# Status LED
output:
  - platform: gpio
    id: status_led
    pin:
      number: GPIO5
      mode: output

interval:
  - interval: 1000ms
    then:
      - output.turn_on: status_led
      - delay: 100ms
      - output.turn_off: status_led

button:
  - platform: restart
    name: "Restart"
